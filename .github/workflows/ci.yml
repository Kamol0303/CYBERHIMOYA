name: V1 CI

on:
  push:
    branches: [main, "CURSOR/**"]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Defensive-only lint
        run: |
          if grep -RIn -E 'exploit|payload.?drop|hack.?back|ddos|c2.?server|active.?probe|metasploit|reverse.?shell' \
            --exclude-dir=__pycache__ app; then
            echo "Offensive capability keywords found in API source"
            exit 1
          fi
          echo "Defensive-only lint passed"
      - name: Test
        run: PYTHONPATH=. pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm install
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
