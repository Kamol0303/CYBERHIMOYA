name: V1 CI

on:
  push:
    branches: [main, "CURSOR/**"]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Defensive-only lint
        run: bash ../../scripts/defensive-lint.sh
      - name: Test
        run: PYTHONPATH=. pytest -q
      - name: Feed verify
        run: PYTHONPATH=. python -c "from app.services.feed import load_feed_pack, verify_signature; p=load_feed_pack(); assert verify_signature(p['signed_payload'], p['signature'])"
      - name: Smoke
        run: PYTHONPATH=. python ../../scripts/smoke_v1.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm install
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
