name: V1 CI

on:
  push:
    branches: [main, "CURSOR/**"]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Defensive-only lint
        run: bash ../../scripts/defensive-lint.sh
      - name: Extension packaging
        run: bash ../../scripts/validate_extension.sh
      - name: Test
        run: PYTHONPATH=. pytest -q
      - name: Feed verify
        run: PYTHONPATH=. python -c "from app.services.feed import load_feed_pack, verify_signature; p=load_feed_pack(); assert verify_signature(p['signed_payload'], p['signature'])"
      - name: Smoke
        run: PYTHONPATH=. python ../../scripts/smoke_v1.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm install
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start
        run: docker compose up --build -d
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health | grep -q '"defensive_only":true'; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Check web shell
        run: |
          curl -fsS -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8080/ | grep -E '200|304'
          curl -fsS -o /dev/null http://127.0.0.1:8080/sw.js
          curl -fsS -o /dev/null http://127.0.0.1:8080/icon-192.png
          curl -fsS -o /dev/null http://127.0.0.1:8080/manifest.webmanifest
      - name: Tear down
        if: always()
        run: docker compose down -v
