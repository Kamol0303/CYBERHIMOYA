services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CGA_DATABASE_URL: sqlite:////data/cga.db
      CGA_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      CGA_SECRET_KEY: docker-dev-change-me
    volumes:
      - cga-data:/data

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  cga-data:
